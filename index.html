<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spellatron</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<main id="app">
  <header>
    <h1>Spellatron</h1>
  </header>

  <section id="setup" class="card">
    <div class="home-mascots" aria-hidden="true">
      <img src="Images/Monty_Standard.png" alt="" class="mascot" />
      <img src="Images/NinjaBunny_Standard.png" alt="" class="mascot" />
    </div>
    <h2 id="setup-heading">Who's practicing?</h2>
    <div id="greeting" class="hidden">
      <span class="name"></span>
      <span class="meta"></span>
    </div>
    <div id="home-streak" class="streak hidden" aria-live="polite"></div>
    <div id="home-chocolate" class="chocolate-prize hidden">
      🍫 Send a screen shot of this to your parents to get a chocolate surprise!
    </div>
    <div id="setup-fields">
      <label>
        Name
        <input id="name-input" type="text" placeholder="Your name" autocomplete="off" />
      </label>
      <label>
        Level
        <select id="level-select"></select>
      </label>
    </div>
    <div class="row">
      <button id="start-btn" class="primary">Start</button>
      <button id="change-settings-btn" class="hidden">Change</button>
      <button id="history-btn">View history</button>
    </div>
  </section>

  <section id="history" class="card hidden">
    <div class="row header-row">
      <h2>History</h2>
      <div class="row">
        <select id="history-filter" aria-label="Filter by name"></select>
        <button id="back-from-history-btn">Back</button>
      </div>
    </div>
    <div id="history-summary" class="muted"></div>
    <ul id="history-list"></ul>
  </section>

  <section id="quiz" class="card hidden">
    <div id="progress"></div>
    <div class="mascot-stage" aria-hidden="true">
      <img id="quiz-mascot" class="mascot" alt="" />
    </div>
    <div id="word-emoji" class="word-emoji hidden" aria-hidden="true"></div>
    <div class="word-controls">
      <button id="say-word-btn">🔊 Say the word</button>
      <button id="say-sentence-btn">💬 Use it in a sentence</button>
    </div>
    <form id="answer-form">
      <input id="answer-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Type the word here" />
      <button type="submit" class="primary">Check</button>
    </form>
    <div id="feedback" aria-live="polite"></div>
    <button id="next-btn" class="primary hidden">Next</button>
  </section>

  <section id="results" class="card hidden">
    <h2>All done!</h2>
    <div id="results-mascot" class="mascot" aria-hidden="true"></div>
    <div id="results-streak" class="streak hidden" aria-live="polite"></div>
    <div id="results-chocolate" class="chocolate-prize hidden">
      🍫 Send a screen shot of this to your parents to get a chocolate surprise!
    </div>
    <div id="score"></div>
    <ul id="missed-list"></ul>
    <div class="row">
      <button id="retry-missed-btn">Retry missed words</button>
      <button id="restart-btn" class="primary">New practice</button>
    </div>
  </section>
</main>

<script src="words.js"></script>
<script src="app.js"></script>
</body>
</html>
