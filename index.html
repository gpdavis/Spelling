<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'self' https://docs.google.com; base-uri 'self'; form-action 'self' https://docs.google.com;" />
<title>Spellatron</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0b1220" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<main id="app">
   <section id="setup" class="card">
    <div class="home-logo">
      <svg class="home-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" role="img" aria-label="Spellatron logo">
        <circle cx="100" cy="105" r="95" fill="none" stroke="#fff" stroke-width="4"/>

        <defs>
          <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
          </pattern>
        </defs>
        <circle cx="100" cy="105" r="91" fill="url(#hatch)"/>

        <rect x="88" y="130" width="24" height="12" rx="2" fill="none" stroke="#fff" stroke-width="2.5"/>
        <rect x="58" y="72" width="84" height="62" rx="8" fill="none" stroke="#fff" stroke-width="3"/>
        <rect x="96" y="60" width="8" height="14" rx="2" fill="none" stroke="#fff" stroke-width="2.5"/>
        <circle cx="100" cy="56" r="7" fill="none" stroke="#fff" stroke-width="2.5"/>
        <circle cx="98" cy="54" r="2" fill="#fff"/>
        <rect x="67" y="82" width="66" height="28" rx="4" fill="none" stroke="#fff" stroke-width="2"/>
        <rect x="72" y="87" width="22" height="18" rx="3" fill="none" stroke="#fff" stroke-width="2"/>
        <line x1="72" y1="91" x2="94" y2="91" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
        <line x1="72" y1="95" x2="94" y2="95" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
        <line x1="72" y1="99" x2="94" y2="99" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
        <circle cx="83" cy="96" r="5" fill="#fff"/>
        <circle cx="81" cy="94" r="1.5" fill="#111a2e"/>
        <rect x="106" y="87" width="22" height="18" rx="3" fill="none" stroke="#fff" stroke-width="2"/>
        <line x1="106" y1="91" x2="128" y2="91" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
        <line x1="106" y1="95" x2="128" y2="95" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
        <line x1="106" y1="99" x2="128" y2="99" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
        <circle cx="117" cy="96" r="5" fill="#fff"/>
        <circle cx="115" cy="94" r="1.5" fill="#111a2e"/>
        <rect x="67" y="116" width="66" height="14" rx="3" fill="none" stroke="#fff" stroke-width="1.5"/>
        <text x="100" y="127" font-family="Courier New, monospace" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">S-P-E-L-L</text>

        <rect x="68" y="142" width="64" height="44" rx="6" fill="none" stroke="#fff" stroke-width="3"/>
        <rect x="78" y="150" width="44" height="28" rx="3" fill="none" stroke="#fff" stroke-width="1.5"/>
        <circle cx="83" cy="155" r="3" fill="none" stroke="#fff" stroke-width="1.5"/>
        <circle cx="117" cy="155" r="3" fill="none" stroke="#fff" stroke-width="1.5"/>
        <circle cx="83" cy="173" r="3" fill="none" stroke="#fff" stroke-width="1.5"/>
        <circle cx="117" cy="173" r="3" fill="none" stroke="#fff" stroke-width="1.5"/>
        <polygon points="100,157 102,163 108,163 103,167 105,173 100,169 95,173 97,167 92,163 98,163" fill="#fff"/>
        <rect x="46" y="144" width="22" height="12" rx="4" fill="none" stroke="#fff" stroke-width="2.5"/>
        <circle cx="40" cy="150" r="8" fill="none" stroke="#fff" stroke-width="2.5"/>
        <rect x="132" y="144" width="22" height="12" rx="4" fill="none" stroke="#fff" stroke-width="2.5"/>
        <circle cx="160" cy="150" r="8" fill="none" stroke="#fff" stroke-width="2.5"/>

        <polygon points="22,68 24,74 30,74 25,78 27,84 22,80 17,84 19,78 14,74 20,74" fill="#fff"/>
        <polygon points="178,68 180,74 186,74 181,78 183,84 178,80 173,84 175,78 170,74 176,74" fill="#fff"/>

        <line x1="10" y1="210" x2="190" y2="210" stroke="#fff" stroke-width="2"/>
        <line x1="10" y1="214" x2="190" y2="214" stroke="#fff" stroke-width="0.5"/>
        <text x="100" y="238" font-family="Impact, Arial Black, sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="4">SPELLATRON</text>
        <line x1="10" y1="253" x2="190" y2="253" stroke="#fff" stroke-width="0.5"/>
        <line x1="10" y1="257" x2="190" y2="257" stroke="#fff" stroke-width="2"/>
        <polygon points="10,235 15,230 20,235 15,240" fill="#fff"/>
        <polygon points="180,235 185,230 190,235 185,240" fill="#fff"/>
      </svg>
    </div>
    <h2 id="setup-heading">Who's practicing?</h2>
    <div id="greeting" class="hidden">
      <span class="name"></span>
      <span class="meta"></span>
    </div>
    <div id="home-streak" class="streak hidden" aria-live="polite"></div>
    <div id="home-chocolate" class="chocolate-prize hidden"></div>
    <div id="setup-fields">
      <label>
        Name
        <input id="name-input" type="text" placeholder="Your name" autocomplete="off" />
      </label>
      <label>
        Level
        <select id="level-select"></select>
      </label>
    </div>
    <div class="subject-buttons row">
      <button id="start-spelling-btn" class="primary subject-btn">📝 Spelling</button>
      <button id="start-maths-btn" class="primary subject-btn">🔢 Maths</button>
    </div>
    <div class="row">
      <button id="change-settings-btn" class="hidden">Change</button>
      <button id="history-btn">View history</button>
    </div>
  </section>

  <section id="history" class="card hidden">
    <div class="row header-row">
      <h2>History</h2>
      <div class="row">
        <select id="history-filter" aria-label="Filter by name"></select>
        <button id="back-from-history-btn">Back</button>
      </div>
    </div>
    <div id="history-summary" class="muted"></div>
    <ul id="history-list"></ul>
  </section>

  <section id="quiz" class="card hidden">
    <div id="progress"></div>
    <div class="mascot-stage" aria-hidden="true">
      <div id="quiz-mascot" class="mascot"></div>
    </div>
    <div id="word-emoji" class="word-emoji hidden" aria-hidden="true"></div>
    <div id="question-context" class="question-context hidden"></div>
    <div id="question-image" class="question-image hidden" aria-hidden="true"></div>
    <div id="question-text" class="question-text hidden"></div>
    <div id="number-line" class="number-line hidden" aria-hidden="true"></div>
    <div id="word-controls" class="word-controls">
      <button id="say-word-btn">🔊 Say the word</button>
      <button id="say-sentence-btn">💬 Use it in a sentence</button>
    </div>
    <form id="answer-form">
      <input id="answer-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Type the word here" />
      <button type="submit" class="primary">Check</button>
    </form>
    <div id="feedback" aria-live="polite"></div>
    <button id="next-btn" class="primary hidden">Next</button>
  </section>

  <section id="results" class="card hidden">
    <h2>All done!</h2>
    <div id="results-mascot" class="mascot" aria-hidden="true"></div>
    <div id="results-streak" class="streak hidden" aria-live="polite"></div>
    <div id="results-chocolate" class="chocolate-prize hidden"></div>
    <div id="score"></div>
    <ul id="missed-list"></ul>
    <div class="row">
      <button id="retry-missed-btn">Retry missed</button>
      <button id="restart-btn" class="primary">New practice</button>
    </div>
  </section>
</main>

<script src="words.js"></script>
<script src="maths.js"></script>
<script src="prizes.js"></script>
<script src="app.js"></script>
</body>
</html>
