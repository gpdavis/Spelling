<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" role="img" aria-label="Streak celebration robot">
  <style>
    #r2-whole { animation: jumpBounce 0.6s ease-in-out infinite alternate; transform-origin: center bottom; }
    #r2-head { animation: headWiggle 0.3s ease-in-out infinite alternate; transform-origin: center bottom; }
    #r2-arm-l { animation: raiseArmL 0.6s ease-in-out infinite alternate; transform-origin: 100% 50%; }
    #r2-arm-r { animation: raiseArmR 0.6s ease-in-out infinite alternate; transform-origin: 0% 50%; }
    #r2-antenna { animation: antennaSpin 0.4s linear infinite; transform-origin: 50% 100%; }
    .confetti { animation: confettiFly 1.2s ease-in infinite; opacity: 0; }
    .c1 { animation-delay: 0s; } .c2 { animation-delay: 0.2s; } .c3 { animation-delay: 0.4s; }
    .c4 { animation-delay: 0.6s; } .c5 { animation-delay: 0.8s; } .c6 { animation-delay: 1.0s; }
    #r2-star { animation: starPulse 0.5s ease-in-out infinite alternate; transform-origin: center; }
    #r2-burst { animation: burstSpin 4s linear infinite; transform-origin: 100px 95px; }
    @keyframes jumpBounce { from { transform: translateY(0) scaleX(1); } to { transform: translateY(-18px) scaleX(1.05); } }
    @keyframes headWiggle { from { transform: rotate(-8deg); } to { transform: rotate(8deg); } }
    @keyframes raiseArmL { from { transform: rotate(-20deg); } to { transform: rotate(-60deg); } }
    @keyframes raiseArmR { from { transform: rotate(20deg); } to { transform: rotate(60deg); } }
    @keyframes antennaSpin { from { transform: rotate(-15deg); } to { transform: rotate(15deg); } }
    @keyframes confettiFly { 0% { opacity: 0; transform: translate(0,0) rotate(0deg); } 20% { opacity: 1; } 100% { opacity: 0; transform: translate(var(--dx), -60px) rotate(360deg); } }
    @keyframes starPulse { from { transform: scale(1); } to { transform: scale(1.3); } }
    @keyframes burstSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } .confetti { opacity: 1; } }
  </style>
  <defs>
    <pattern id="h2" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#ddd" stroke-width="1"></line>
    </pattern>
  </defs>

  <g id="r2-burst">
    <line x1="100" y1="7" x2="100" y2="0" stroke="black" stroke-width="2.5"></line>
    <line x1="167" y1="30" x2="172" y2="25" stroke="black" stroke-width="2.5"></line>
    <line x1="193" y1="95" x2="200" y2="95" stroke="black" stroke-width="2.5"></line>
    <line x1="167" y1="160" x2="172" y2="165" stroke="black" stroke-width="2.5"></line>
    <line x1="100" y1="183" x2="100" y2="190" stroke="black" stroke-width="2.5"></line>
    <line x1="33" y1="160" x2="28" y2="165" stroke="black" stroke-width="2.5"></line>
    <line x1="7" y1="95" x2="0" y2="95" stroke="black" stroke-width="2.5"></line>
    <line x1="33" y1="30" x2="28" y2="25" stroke="black" stroke-width="2.5"></line>
    <line x1="148" y1="12" x2="152" y2="7" stroke="black" stroke-width="1.5"></line>
    <line x1="188" y1="52" x2="193" y2="48" stroke="black" stroke-width="1.5"></line>
    <line x1="188" y1="138" x2="193" y2="142" stroke="black" stroke-width="1.5"></line>
    <line x1="148" y1="178" x2="152" y2="183" stroke="black" stroke-width="1.5"></line>
    <line x1="52" y1="178" x2="48" y2="183" stroke="black" stroke-width="1.5"></line>
    <line x1="12" y1="138" x2="7" y2="142" stroke="black" stroke-width="1.5"></line>
    <line x1="12" y1="52" x2="7" y2="48" stroke="black" stroke-width="1.5"></line>
    <line x1="52" y1="12" x2="48" y2="7" stroke="black" stroke-width="1.5"></line>
  </g>

  <circle cx="100" cy="95" r="88" fill="white" stroke="black" stroke-width="3.5"></circle>
  <circle cx="100" cy="95" r="84" fill="url(#h2)"></circle>

  <circle class="confetti c1" cx="60" cy="50" r="5" fill="black" style="--dx: -20px"></circle>
  <rect class="confetti c2" x="130" y="45" width="8" height="8" fill="black" style="--dx: 15px"></rect>
  <circle class="confetti c3" cx="80" cy="40" r="4" fill="black" style="--dx: -10px"></circle>
  <rect class="confetti c4" x="115" y="55" width="6" height="6" fill="black" style="--dx: 20px"></rect>
  <circle class="confetti c5" cx="50" cy="65" r="3" fill="black" style="--dx: -25px"></circle>
  <circle class="confetti c6" cx="150" cy="60" r="4" fill="black" style="--dx: 18px"></circle>

  <g id="r2-whole">
    <g id="r2-antenna">
      <rect x="96" y="8" width="8" height="14" rx="2" fill="white" stroke="black" stroke-width="2.5"></rect>
      <circle cx="100" cy="5" r="7" fill="white" stroke="black" stroke-width="2.5"></circle>
      <circle cx="98" cy="3" r="2" fill="black"></circle>
    </g>

    <g id="r2-head">
      <rect x="52" y="20" width="96" height="62" rx="8" fill="white" stroke="black" stroke-width="3"></rect>
      <rect x="62" y="30" width="76" height="26" rx="4" fill="#f0f0f0" stroke="black" stroke-width="2"></rect>
      <rect x="66" y="33" width="26" height="20" rx="3" fill="white" stroke="black" stroke-width="2"></rect>
      <path d="M 70 46 Q 79 36 88 46" stroke="black" stroke-width="3" fill="none" stroke-linecap="round"></path>
      <rect x="108" y="33" width="26" height="20" rx="3" fill="white" stroke="black" stroke-width="2"></rect>
      <path d="M 112 46 Q 121 36 130 46" stroke="black" stroke-width="3" fill="none" stroke-linecap="round"></path>
      <rect x="62" y="62" width="76" height="15" rx="3" fill="black"></rect>
      <path d="M 68 66 Q 100 76 132 66" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"></path>
      <circle cx="72" cy="67" r="2" fill="white"></circle>
      <circle cx="128" cy="67" r="2" fill="white"></circle>
    </g>

    <rect x="88" y="82" width="24" height="12" rx="2" fill="white" stroke="black" stroke-width="2.5"></rect>

    <g id="r2-arm-l" style="transform-box: fill-box;">
      <rect x="22" y="72" width="30" height="12" rx="5" fill="white" stroke="black" stroke-width="2.5" transform="rotate(-50,37,78)"></rect>
      <circle cx="15" cy="62" r="10" fill="white" stroke="black" stroke-width="2.5"></circle>
    </g>
    <g id="r2-arm-r" style="transform-box: fill-box;">
      <rect x="148" y="72" width="30" height="12" rx="5" fill="white" stroke="black" stroke-width="2.5" transform="rotate(50,163,78)"></rect>
      <circle cx="185" cy="62" r="10" fill="white" stroke="black" stroke-width="2.5"></circle>
    </g>

    <rect x="60" y="94" width="80" height="48" rx="6" fill="white" stroke="black" stroke-width="3"></rect>
    <rect x="72" y="103" width="56" height="32" rx="3" fill="#f0f0f0" stroke="black" stroke-width="1.5"></rect>
    <circle cx="77" cy="108" r="3" fill="white" stroke="black" stroke-width="1.5"></circle>
    <circle cx="123" cy="108" r="3" fill="white" stroke="black" stroke-width="1.5"></circle>
    <circle cx="77" cy="130" r="3" fill="white" stroke="black" stroke-width="1.5"></circle>
    <circle cx="123" cy="130" r="3" fill="white" stroke="black" stroke-width="1.5"></circle>
    <g id="r2-star" style="transform-box: fill-box;">
      <polygon points="100,106 103,114 111,114 105,119 107,127 100,122 93,127 95,119 89,114 97,114" fill="black"></polygon>
    </g>
  </g>

  <!-- Title banner, shifted clear of the circle (bottom at y=183) and burst -->
  <g transform="translate(0,40)">
    <line x1="10" y1="160" x2="190" y2="160" stroke="black" stroke-width="2"></line>
    <line x1="10" y1="164" x2="190" y2="164" stroke="black" stroke-width="0.5"></line>
    <text x="100" y="180" font-family="Impact, sans-serif" font-size="15" fill="black" text-anchor="middle" letter-spacing="3">SPELLATRON</text>
    <text x="100" y="196" font-family="Courier New" font-size="9" font-weight="bold" fill="black" text-anchor="middle" letter-spacing="4">★ STREAK! ★</text>
    <line x1="10" y1="202" x2="190" y2="202" stroke="black" stroke-width="0.5"></line>
    <line x1="10" y1="206" x2="190" y2="206" stroke="black" stroke-width="2"></line>
    <polygon points="10,190 15,185 20,190 15,195" fill="black"></polygon>
    <polygon points="180,190 185,185 190,190 185,195" fill="black"></polygon>
  </g>
</svg>
